name: deploy-core

on:
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/rdash-core

jobs:
  build-scan-publish-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: docker build -f services/core/Dockerfile -t $IMAGE_NAME:${{ github.sha }} .

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: "0"

      - name: Push image
        run: docker push $IMAGE_NAME:${{ github.sha }}

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: azure/setup-kubectl@v4
      - uses: azure/setup-helm@v4

      - name: Get AKS credentials
        run: az aks get-credentials -g ${{ secrets.AKS_RESOURCE_GROUP }} -n ${{ secrets.AKS_CLUSTER_NAME }} --overwrite-existing

      - name: Deploy core service
        run: |
          helm upgrade --install core helm/charts/rdash-service \
            -n rdash \
            --create-namespace \
            -f helm/values/core.yaml \
            --set image.repository=$IMAGE_NAME \
            --set image.tag=${{ github.sha }}
