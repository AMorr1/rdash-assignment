apiVersion: v1
kind: Service
metadata:
  name: {{ include "rdash-service.fullname" . }}
spec:
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
  selector:
    app.kubernetes.io/name: {{ include "rdash-service.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}

