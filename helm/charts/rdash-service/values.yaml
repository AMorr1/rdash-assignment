nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/example/rdash-core
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  port: 8080

ingress:
  enabled: true
  className: nginx
  hostname: app.rdash.example.com
  tlsSecretName: app-rdash-tls
  annotations: {}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

env: {}

envSecrets: []

externalSecret:
  enabled: false
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  targetName: ""
  data: []

networkPolicy:
  enabled: true
  allowedEgressCidrs: []
  allowDns: true
  ingressNamespaces: []
  defaultDenyNamespace: true

pdb:
  enabled: true
  minAvailable: 1

probes:
  path: /healthz

serviceMonitor:
  enabled: true
  interval: 30s

podAnnotations: {}
podLabels: {}
nodeSelector:
  pool: app
tolerations:
  - key: workload
    operator: Equal
    value: app
    effect: NoSchedule
affinity: {}
