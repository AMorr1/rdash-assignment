global:
  domain_name: rdash.example.com
  letsencrypt_email: platform@example.com
  slack_webhook_url: ""
  grafana_password: change-me
  tenant_id: ""
  keyvault_name: rdash-kv
  workload_identity_client_id: ""

ingress-nginx:
  controller:
    replicaCount: 2
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
    service:
      externalTrafficPolicy: Local
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    config:
      limit-req-status-code: "429"
      use-forwarded-headers: "true"
      proxy-buffer-size: "16k"

cert-manager:
  installCRDs: true

external-secrets:
  installCRDs: true

loki:
  deploymentMode: SimpleScalable
  minio:
    enabled: true
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    schemaConfig:
      configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    storage:
      type: s3
      bucketNames:
        chunks: chunks
        ruler: ruler
        admin: admin
  backend:
    replicas: 2
  read:
    replicas: 2
  write:
    replicas: 2

kube-prometheus-stack:
  grafana:
    adminPassword: change-me
  prometheus:
    prometheusSpec:
      retention: 15d
      replicas: 2
  alertmanager:
    config:
      global:
        resolve_timeout: 5m
      route:
        receiver: slack-notifications
        group_by: ["alertname", "severity"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
      receivers:
        - name: slack-notifications
          slack_configs:
            - api_url_file: /etc/alertmanager/secrets/slack-webhook/url
              channel: "#platform-alerts"
              send_resolved: true
    alertmanagerSpec:
      replicas: 2
      secrets:
        - slack-webhook
